<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fieldbook — Work Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #1F2623;
    --charcoal-2: #29322D;
    --charcoal-3: #333D36;
    --paper: #F6F3EC;
    --paper-2: #EFEAE0;
    --paper-line: #DDD6C4;
    --amber: #E2932F;
    --amber-deep: #B9701A;
    --field-green: #3F6B4F;
    --field-green-deep: #2C4E38;
    --clay: #B4502E;
    --clay-deep: #8C3B20;
    --steel-blue: #4A6C7A;
    --steel-blue-deep: #35505C;
    --ink: #211D17;
    --slate: #6F6A5D;
    --slate-light: #A29C8B;
    --cream-text: #F2EFE6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
  }

  .headline-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.04em; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }

  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

  /* ===== SIDEBAR (shared) ===== */
  .sidebar { background: var(--charcoal); color: var(--cream-text); padding: 20px 0; display: flex; flex-direction: column; }
  .brand { padding: 0 20px 24px; border-bottom: 1px solid rgba(242,239,230,0.1); margin-bottom: 18px; }
  .brand-mark { display: flex; align-items: center; gap: 9px; }
  .brand-name { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 19px; letter-spacing: 0.06em; text-transform: uppercase; }
  .brand-sub { font-size: 10.5px; color: var(--slate-light); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
  .nav-group-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate-light); padding: 0 20px; margin: 16px 0 6px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 20px; color: var(--cream-text); font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent; cursor: pointer; }
  .nav-item .count { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: rgba(242,239,230,0.08); padding: 1px 6px; border-radius: 2px; color: var(--slate-light); }
  .nav-item.active { background: var(--charcoal-2); border-left-color: var(--amber); }
  .nav-item.active .count { background: var(--amber); color: var(--charcoal); font-weight: 600; }
  .nav-item:hover:not(.active) { background: rgba(242,239,230,0.05); }
  .nav-item svg { flex-shrink: 0; opacity: 0.85; }
  .sidebar-footer { margin-top: auto; padding: 14px 20px 0; border-top: 1px solid rgba(242,239,230,0.1); }
  .location-pill { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--slate-light); }
  .location-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--field-green); box-shadow: 0 0 0 2px rgba(63,107,79,0.25); flex-shrink: 0; }

  .main { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== TOPBAR / BREADCRUMB ===== */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-bottom: 1px solid var(--paper-line); }
  .crumb { font-size: 12.5px; color: var(--slate); display: flex; align-items: center; gap: 8px; }
  .crumb a:hover { color: var(--ink); }
  .crumb .sep { color: var(--paper-line); }
  .crumb .here { color: var(--ink); font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 30px; height: 30px; border-radius: 3px; background: var(--steel-blue); color: white; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; }
  .btn { font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 2px; cursor: pointer; border: 1px solid var(--paper-line); background: white; color: var(--ink); letter-spacing: 0.02em; }
  .btn.primary { background: var(--charcoal); color: var(--cream-text); border-color: var(--charcoal); }

  .content { padding: 22px 28px 60px; flex: 1; }

  /* ===== WO HEADER SLAB ===== */
  .wo-head { background: var(--charcoal); color: var(--cream-text); border-radius: 3px; padding: 20px 24px; display: flex; justify-content: space-between; gap: 24px; position: relative; overflow: hidden; margin-bottom: 6px; }
  .wo-head::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--amber); }
  .wo-head.dept-overdue::before { background: var(--clay); }
  .wo-head-l { min-width: 0; }
  .wo-id-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .wo-id { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--amber); letter-spacing: 0.04em; }
  .wo-bay { font-size: 11px; color: var(--slate-light); font-family: 'IBM Plex Mono', monospace; }
  .wo-title { font-family: 'Oswald', sans-serif; font-size: 25px; font-weight: 600; line-height: 1.1; letter-spacing: 0.01em; }
  .wo-sub { font-size: 12.5px; color: var(--slate-light); margin-top: 7px; display: flex; flex-wrap: wrap; gap: 18px; }
  .wo-sub b { color: var(--cream-text); font-weight: 500; }
  .wo-head-r { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; flex-shrink: 0; }

  .stamp { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border: 2px solid currentColor; border-radius: 4px; transform: rotate(-3deg); white-space: nowrap; }
  .stamp.progress { color: var(--amber); }
  .stamp.ready { color: #7FB893; }
  .stamp.waiting { color: #D98A63; }
  .stamp.overdue { color: #E08663; background: rgba(224,134,99,0.1); }
  .wo-priority { font-size: 11px; color: var(--slate-light); text-align: right; }
  .wo-priority b { color: var(--cream-text); }
  .wo-priority b.warn { color: #E08663; }

  /* ===== LIFECYCLE STEPPER ===== */
  .lifecycle { background: white; border: 1px solid var(--paper-line); border-radius: 3px; padding: 20px 24px 18px; margin-bottom: 20px; }
  .lifecycle-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  .lifecycle-head .section-title { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .lifecycle-head .elapsed { font-size: 12px; color: var(--slate); }
  .lifecycle-head .elapsed b { font-family: 'IBM Plex Mono', monospace; color: var(--ink); }

  .stepper { display: flex; position: relative; }
  .step { flex: 1; position: relative; text-align: center; padding-top: 26px; }
  .step::before { content: ""; position: absolute; top: 8px; left: -50%; width: 100%; height: 3px; background: var(--paper-line); z-index: 0; }
  .step:first-child::before { display: none; }
  .step .node { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); width: 15px; height: 15px; border-radius: 50%; background: var(--paper); border: 3px solid var(--paper-line); z-index: 1; }
  .step.done::before { background: var(--field-green); }
  .step.done .node { background: var(--field-green); border-color: var(--field-green); }
  .step.current::before { background: var(--field-green); }
  .step.current .node { background: var(--amber); border-color: var(--amber-deep); box-shadow: 0 0 0 4px rgba(226,147,47,0.2); }
  .step.overdue::before { background: var(--field-green); }
  .step.overdue .node { background: var(--clay); border-color: var(--clay-deep); box-shadow: 0 0 0 4px rgba(180,80,46,0.2); }
  .step-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; color: var(--slate); }
  .step.done .step-name { color: var(--ink); }
  .step.current .step-name { color: var(--amber-deep); }
  .step.overdue .step-name { color: var(--clay-deep); }
  .step-time { font-size: 10px; color: var(--slate-light); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  /* ===== TWO-COL BODY ===== */
  .wo-body { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

  .card { background: white; border: 1px solid var(--paper-line); border-radius: 3px; margin-bottom: 20px; }
  .card-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; border-bottom: 1px solid var(--paper-2); }
  .card-title { font-family: 'Oswald', sans-serif; font-size: 13.5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .card-title .swatch { width: 9px; height: 9px; border-radius: 50%; }
  .card-meta { font-size: 11.5px; color: var(--slate); }

  /* 3 C's */
  .threec { display: flex; gap: 0; border-bottom: 1px solid var(--paper-2); }
  .threec:last-child { border-bottom: none; }
  .threec-label { width: 96px; flex-shrink: 0; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate); padding: 14px 0 14px 18px; }
  .threec-label.complaint { border-left: 3px solid var(--clay); }
  .threec-label.cause { border-left: 3px solid var(--amber); }
  .threec-label.correction { border-left: 3px solid var(--field-green); }
  .threec-text { padding: 14px 18px 14px 14px; font-size: 13px; }
  .threec-text .muted { color: var(--slate-light); font-style: italic; }

  /* line tables */
  .ltable { width: 100%; border-collapse: collapse; }
  .ltable th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate); font-weight: 600; text-align: left; padding: 9px 18px; border-bottom: 1px solid var(--paper-2); }
  .ltable th.num, .ltable td.num { text-align: right; font-family: 'IBM Plex Mono', monospace; }
  .ltable td { padding: 12px 18px; border-bottom: 1px solid var(--paper-2); font-size: 13px; vertical-align: top; }
  .ltable tr:last-child td { border-bottom: none; }
  .ltable .code { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--slate); }
  .ltable .op-name { font-weight: 500; }
  .ltable .sub { font-size: 11px; color: var(--slate); margin-top: 2px; }
  .ltable .empty { color: var(--slate-light); font-style: italic; text-align: center; }

  .tag { display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; border: 1px solid currentColor; }
  .tag.done { color: var(--field-green-deep); }
  .tag.active { color: var(--amber-deep); background: rgba(226,147,47,0.08); }
  .tag.hold { color: var(--clay-deep); background: rgba(180,80,46,0.06); }
  .tag.warranty { color: var(--steel-blue-deep); border-style: dashed; }
  .tag.backorder { color: var(--amber-deep); }

  /* right rail */
  .side-card { background: white; border: 1px solid var(--paper-line); border-radius: 3px; margin-bottom: 18px; }
  .side-head { padding: 11px 16px; border-bottom: 1px solid var(--paper-2); font-family: 'Oswald', sans-serif; font-size: 12.5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

  /* cost summary */
  .cost-body { padding: 6px 16px 12px; }
  .cost-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--paper-2); }
  .cost-row .lbl { color: var(--slate); }
  .cost-row .val { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }
  .cost-split { display: flex; gap: 8px; padding: 12px 0 4px; }
  .cost-chip { flex: 1; border: 1px solid var(--paper-line); border-radius: 2px; padding: 9px 10px; }
  .cost-chip.warranty { border-color: var(--steel-blue); background: rgba(74,108,122,0.05); }
  .cost-chip.customer { border-color: var(--amber-deep); background: rgba(226,147,47,0.06); }
  .cost-chip .clbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--slate); }
  .cost-chip .cval { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; margin-top: 2px; }
  .cost-total { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0 6px; margin-top: 4px; border-top: 2px solid var(--ink); }
  .cost-total .lbl { font-family: 'Oswald', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
  .cost-total .val { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; }
  .cost-note { font-size: 11px; color: var(--slate); font-style: italic; margin-top: 8px; }

  /* authorization */
  .auth-body { padding: 14px 16px; }
  .auth-state { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .auth-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .auth-dot.ok { background: var(--field-green); }
  .auth-dot.hold { background: var(--clay); }
  .auth-note { font-size: 11.5px; color: var(--slate); }
  .auth-sig { margin-top: 12px; border: 1px dashed var(--paper-line); border-radius: 3px; padding: 10px 12px; background: var(--paper-2); }
  .auth-sig .sig-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-style: italic; color: var(--charcoal-2); transform: rotate(-1.5deg); }
  .auth-sig .sig-meta { font-size: 10.5px; color: var(--slate-light); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

  /* warranty panel */
  .warr-body { padding: 14px 16px; }
  .warr-line { display: flex; justify-content: space-between; font-size: 12.5px; padding: 6px 0; }
  .warr-line .k { color: var(--slate); }
  .warr-line .v { font-family: 'IBM Plex Mono', monospace; }
  .warr-status { margin-top: 10px; padding: 10px 12px; border-radius: 3px; background: rgba(74,108,122,0.08); border-left: 3px solid var(--steel-blue); font-size: 12px; }
  .warr-status b { color: var(--steel-blue-deep); }
  .warr-status.flagged { background: rgba(180,80,46,0.08); border-left-color: var(--clay); }
  .warr-status.flagged b { color: var(--clay-deep); }

  /* meta list */
  .meta-body { padding: 6px 16px 12px; }
  .meta-row { display: flex; justify-content: space-between; gap: 10px; padding: 8px 0; font-size: 12.5px; border-bottom: 1px solid var(--paper-2); }
  .meta-row:last-child { border-bottom: none; }
  .meta-row .k { color: var(--slate); flex-shrink: 0; }
  .meta-row .v { text-align: right; font-weight: 500; }
  .meta-row .v.warn { color: var(--clay-deep); }
  .meta-row .v .mono { font-family: 'IBM Plex Mono', monospace; font-weight: 400; font-size: 11.5px; }

  /* activity */
  .activity { padding: 6px 18px 14px; }
  .act-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--paper-2); }
  .act-row:last-child { border-bottom: none; }
  .act-rail { display: flex; flex-direction: column; align-items: center; }
  .act-node { width: 9px; height: 9px; border-radius: 50%; background: var(--slate-light); margin-top: 4px; }
  .act-node.warranty { background: var(--steel-blue); }
  .act-node.parts { background: var(--field-green); }
  .act-node.labor { background: var(--amber); }
  .act-text { font-size: 12.5px; }
  .act-text b { font-weight: 600; }
  .act-time { font-size: 10.5px; color: var(--slate-light); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

  @media (max-width: 1040px) { .wo-body { grid-template-columns: 1fr; } }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stepper { flex-wrap: wrap; gap: 14px; }
    .step { flex: 0 0 33%; }
    .step::before { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="10" width="20" height="10" rx="1" fill="#E2932F"/>
          <rect x="4" y="12" width="6" height="4" fill="#1F2623"/>
          <circle cx="7" cy="21" r="2.3" fill="#1F2623" stroke="#F2EFE6" stroke-width="1"/>

          <rect x="16" y="7" width="5" height="6" rx="0.5" fill="#E2932F"/>

  <!-- MAIN -->
  <div class="main">

        <a class="btn" id="bay-link" href="bay.html">Open bay view →</a>

<script>
/* ============================================================
   Work order records — keyed by ID. The detail screen is one
   template; ?wo=<id> selects which record to render. Continuity
   with the dashboard tickets (index.html) and the manufacturer
   feed is intentional (see WO-88142 / Kubota serial flag).
   ============================================================ */
const RECORDS = {
  "88213": {
    dept: "service",
    bay: "BAY 2 · CUSTOMER-PAY + WARRANTY",
    title: "John Deere 8R 250 — Hydraulic Leak &amp; PTO Inspection",
    sub: [["Unit", "Hendricks Farm #4"], ["PIN", "1RW8R250_JD012947", true], ["Customer", "Hendricks Family Farms"], ["Opened", "Jun 28"]],
    stamp: { cls: "progress", label: "In Progress" },
    priority: `Promised: <b>Jul 3, 5:00 PM</b><br>2 days remaining`,
    elapsed: `Age <b>3d 4h</b> · Labor logged <b>6.5h</b> of 9.0h est.`,
    steps: [

/* ---------- render helpers ---------- */
function subHTML(sub) {
  return sub.map(([k, v, mono]) => `<span>${k}: <b${mono ? ' class="mono"' : ''}>${v}</b></span>`).join("");
}
function stepsHTML(steps) {
  return steps.map(s => `<div class="step ${s.state}"><span class="node"></span><div class="step-name">${s.name}</div><div class="step-time">${s.time}</div></div>`).join("");
}
function laborHTML(labor) {
  return labor.map(l => `<tr>
    <td><div class="op-name">${l.op}</div><div class="sub code">${l.code}</div></td>
    <td class="num">${l.est}</td><td class="num">${l.actual}</td>
    <td><span class="tag ${l.tag[0]}">${l.tag[1]}</span></td>
    <td class="num">${l.amount}</td></tr>`).join("");
}
function partsHTML(parts) {
  if (!parts.length) return `<tr><td colspan="5" class="empty">No parts added — pending diagnosis.</td></tr>`;
  return parts.map(p => `<tr>
    <td class="code">${p.num}</td><td>${p.desc}</td><td class="num">${p.qty}</td>
    <td><span class="tag ${p.tag[0]}">${p.tag[1]}</span></td>
    <td class="num">${p.ext}</td></tr>`).join("");
}
function activityHTML(rows) {
  return rows.map(a => `<div class="act-row">
    <div class="act-rail"><span class="act-node ${a.node}"></span></div>
    <div><div class="act-text">${a.text}</div><div class="act-time">${a.time}</div></div></div>`).join("");
}
function costChipsHTML(c) {
  if (c.warranty && c.warranty !== "$0.00") {
    return `<div class="cost-chip customer"><div class="clbl">Customer Pay</div><div class="cval">${c.customer}</div></div>
      <div class="cost-chip warranty"><div class="clbl">Warranty</div><div class="cval">${c.warranty}</div></div>`;
  }
  return `<div class="cost-chip customer" style="flex:1"><div class="clbl">Customer Pay</div><div class="cval">${c.customer}</div></div>`;
}
function metaHTML(meta) {
  return meta.map(([k, v, warn]) => `<div class="meta-row"><span class="k">${k}</span><span class="v${warn ? ' ' + warn : ''}">${v}</span></div>`).join("");
}
function authHTML(a) {
  if (!a) return "";
  const sig = a.sigName ? `<div class="auth-sig"><div class="sig-name">${a.sigName}</div><div class="sig-meta">${a.sigMeta}</div></div>` : "";
  return `<div class="side-card"><div class="side-head">Customer Authorization</div>
    <div class="auth-body">
      <div class="auth-state"><span class="auth-dot ${a.dot}"></span>${a.state}</div>
      <div class="auth-note">${a.note}</div>${sig}
    </div></div>`;
}
function warrantyHTML(w) {
  if (!w) return "";
  const lines = w.lines.map(([k, v]) => `<div class="warr-line"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("");
  return `<div class="side-card"><div class="side-head">Warranty Claim</div>
    <div class="warr-body">${lines}
      <div class="warr-status${w.flagged ? ' flagged' : ''}">${w.status}</div>
    </div></div>`;
}

function render(rec) {
  const c = rec.cost;
  document.getElementById("content").innerHTML = `
    <div class="wo-head ${rec.dept === 'overdue' ? 'dept-overdue' : ''}">
      <div class="wo-head-l">
        <div class="wo-id-row"><span class="wo-id">${rec.id}</span><span class="wo-bay">${rec.bay}</span></div>
        <div class="wo-title">${rec.title}</div>
        <div class="wo-sub">${subHTML(rec.sub)}</div>
      </div>
      <div class="wo-head-r">
        <div class="stamp ${rec.stamp.cls}">${rec.stamp.label}</div>
        <div class="wo-priority">${rec.priority}</div>
      </div>
    </div>

    <div class="lifecycle">
      <div class="lifecycle-head"><div class="section-title">Work Order Lifecycle</div><div class="elapsed">${rec.elapsed}</div></div>
      <div class="stepper">${stepsHTML(rec.steps)}</div>
    </div>

    <div class="wo-body">
      <div>
        <div class="card">
          <div class="card-head"><div class="card-title"><span class="swatch" style="background:var(--amber)"></span>Complaint · Cause · Correction</div></div>
          <div>
            <div class="threec"><div class="threec-label complaint">Complaint</div><div class="threec-text">${rec.threeC.complaint}</div></div>
            <div class="threec"><div class="threec-label cause">Cause</div><div class="threec-text">${rec.threeC.cause}</div></div>
            <div class="threec"><div class="threec-label correction">Correction</div><div class="threec-text">${rec.threeC.correction}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title"><span class="swatch" style="background:var(--amber)"></span>Labor Operations</div><div class="card-meta">${rec.laborTech}</div></div>
          <table class="ltable">
            <thead><tr><th>Op / Flat-Rate</th><th class="num">Est</th><th class="num">Actual</th><th>Status</th><th class="num">Amount</th></tr></thead>
            <tbody>${laborHTML(rec.labor)}</tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title"><span class="swatch" style="background:var(--field-green)"></span>Parts</div><div class="card-meta">${rec.partsMeta}</div></div>
          <table class="ltable">
            <thead><tr><th>Part #</th><th>Description</th><th class="num">Qty</th><th>Status</th><th class="num">Ext.</th></tr></thead>
            <tbody>${partsHTML(rec.parts)}</tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title"><span class="swatch" style="background:var(--charcoal-3)"></span>Activity Log</div></div>
          <div class="activity">${activityHTML(rec.activity)}</div>
        </div>
      </div>

      <div>
        <div class="side-card">
          <div class="side-head">Cost Summary</div>
          <div class="cost-body">
            ${c.rows.map(([l, v]) => `<div class="cost-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join("")}
            <div class="cost-split">${costChipsHTML(c)}</div>
            <div class="cost-total"><span class="lbl">${rec.dept === 'overdue' ? 'Est. Total' : 'Est. Total'}</span><span class="val">${c.total}</span></div>
            ${c.note ? `<div class="cost-note">${c.note}</div>` : ""}
          </div>
        </div>
        ${authHTML(rec.auth)}
        ${warrantyHTML(rec.warranty)}
        <div class="side-card">
          <div class="side-head">Unit &amp; Customer</div>
          <div class="meta-body">${metaHTML(rec.meta)}</div>
        </div>
      </div>
    </div>`;
}
