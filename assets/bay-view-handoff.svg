<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="700" viewBox="0 0 1320 700" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1320" height="700" fill="#F6F3EC"/>

  <!-- header -->
  <text x="56" y="58" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" letter-spacing="3" fill="#B9701A">FIELDBOOK · RESPONSIVE HANDOFF</text>
  <text x="56" y="98" font-family="'Oswald','Arial Narrow',sans-serif" font-size="33" font-weight="600" fill="#211D17">One work order, two form factors</text>
  <text x="56" y="126" font-size="14.5" fill="#6F6A5D">A service manager works the job on a desktop board. A technician works the same job on a tablet at the bay.</text>

  <!-- ============ DESKTOP: manager work order ============ -->
  <g transform="translate(50,168)">
    <rect x="7" y="9" width="478" height="306" rx="10" fill="#211D17" opacity="0.05"/>
    <rect width="478" height="306" rx="10" fill="#FFFFFF" stroke="#DDD6C4"/>
    <path d="M0 12 a10 10 0 0 1 10 -10 h458 a10 10 0 0 1 10 10 v18 h-478 z" fill="#EFEAE0"/>
    <circle cx="20" cy="16" r="3.5" fill="#CBC3B0"/><circle cx="33" cy="16" r="3.5" fill="#CBC3B0"/><circle cx="46" cy="16" r="3.5" fill="#CBC3B0"/>
    <text x="72" y="20" font-family="'IBM Plex Mono',monospace" font-size="10.5" fill="#A29C8B">fieldbook / work-order.html?wo=88213</text>

    <!-- topbar row -->
    <text x="22" y="54" font-size="10.5" fill="#8A8474">Dashboard / Service Bay / <tspan fill="#211D17" font-weight="600">WO-88213</tspan></text>
    <!-- highlighted Open bay view button -->
    <rect x="243" y="34" width="146" height="38" rx="10" fill="none" stroke="#E2932F" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85"/>
    <rect x="250" y="41" width="132" height="24" rx="6" fill="#FFFFFF" stroke="#E2932F" stroke-width="2"/>
    <text x="316" y="57.5" font-size="11" text-anchor="middle" font-weight="600" fill="#B9701A">Open bay view →</text>
    <rect x="392" y="41" width="64" height="24" rx="6" fill="#211D17"/>
    <text x="424" y="57.5" font-size="11" text-anchor="middle" fill="#F2EFE6">Actions ▾</text>

    <!-- WO header slab -->
    <g transform="translate(22,84)">
      <rect width="434" height="150" rx="7" fill="#29332D"/>
      <rect width="6" height="150" rx="3" fill="#E2932F"/>
      <text x="24" y="30" font-family="'IBM Plex Mono',monospace" font-size="10.5" fill="#E2932F">WO-88213 · BAY 2 · CUSTOMER-PAY + WARRANTY</text>
      <text x="24" y="62" font-family="'Oswald','Arial Narrow',sans-serif" font-size="20" font-weight="600" fill="#F2EFE6">John Deere 8R 250 —</text>
      <text x="24" y="86" font-family="'Oswald','Arial Narrow',sans-serif" font-size="20" font-weight="600" fill="#F2EFE6">Hydraulic Leak &amp; PTO Inspection</text>
      <text x="24" y="114" font-size="11" fill="#A29C8B">Unit: Hendricks Farm #4 · Opened Jun 28 · Promised Jul 3</text>
      <g transform="translate(308,20) rotate(-6)">
        <rect width="114" height="26" rx="4" fill="none" stroke="#E2932F" stroke-width="2"/>
        <text x="57" y="18" font-family="'Oswald','Arial Narrow',sans-serif" font-size="11.5" font-weight="600" letter-spacing="0.4" text-anchor="middle" fill="#E2932F">IN PROGRESS</text>
      </g>
    </g>
    <!-- faint content rows -->
    <rect x="22" y="248" width="250" height="9" rx="4" fill="#EDE8DC"/>
    <rect x="22" y="266" width="330" height="9" rx="4" fill="#EDE8DC"/>
    <rect x="22" y="284" width="180" height="9" rx="4" fill="#EDE8DC"/>

    <text x="0" y="336" font-family="'Oswald','Arial Narrow',sans-serif" font-size="12" letter-spacing="2" fill="#6F6A5D">MANAGER · DESKTOP</text>
  </g>

  <!-- ============ ARROW ============ -->
  <path d="M540 258 C 660 258, 700 356, 828 356" fill="none" stroke="#B9701A" stroke-width="2.5"/>
  <path d="M828 356 l -13 -6.5 l 3.5 6.5 l -3.5 6.5 z" fill="#B9701A"/>
  <rect x="591" y="292" width="180" height="26" rx="13" fill="#211D17"/>
  <text x="681" y="309" font-family="'Oswald','Arial Narrow',sans-serif" font-size="11" letter-spacing="1.5" text-anchor="middle" fill="#F2EFE6">TAP · OPEN BAY VIEW</text>

  <!-- ============ TABLET: technician bay view ============ -->
  <g transform="translate(872,150)">
    <rect x="8" y="10" width="336" height="466" rx="30" fill="#211D17" opacity="0.08"/>
    <rect width="336" height="466" rx="30" fill="#141A17" stroke="#2C342E" stroke-width="2"/>
    <circle cx="168" cy="21" r="3" fill="#3A423C"/>

    <!-- device column -->
    <g transform="translate(30,36)">
      <rect width="276" height="394" rx="7" fill="#F1ECE1"/>
      <clipPath id="col"><rect width="276" height="394" rx="7"/></clipPath>
      <g clip-path="url(#col)">
        <!-- appbar -->
        <rect width="276" height="48" fill="#1F2623"/>
        <text x="16" y="30" font-size="18" fill="#F2EFE6">‹</text>
        <rect x="32" y="11" width="26" height="26" rx="5" fill="#E2932F"/>
        <text x="45" y="29" font-family="'Oswald','Arial Narrow',sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#211D17">RA</text>
        <text x="68" y="24" font-family="'Oswald','Arial Narrow',sans-serif" font-size="12" font-weight="600" fill="#F2EFE6">R. Alvarez</text>
        <text x="68" y="37" font-size="8.5" letter-spacing="0.5" fill="#A29C8B">BAY 2 · SERVICE</text>
        <text x="262" y="21" font-size="7.5" letter-spacing="0.5" text-anchor="end" fill="#A29C8B">ON SHIFT</text>
        <text x="262" y="35" font-family="'IBM Plex Mono',monospace" font-size="12" text-anchor="end" fill="#F2EFE6">3:12</text>

        <!-- hero card -->
        <g transform="translate(14,60)">
          <rect width="248" height="66" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
          <rect width="6" height="66" rx="3" fill="#E2932F"/>
          <text x="16" y="19" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#6F6A5D">WO-88213</text>
          <text x="16" y="35" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="600" fill="#211D17">John Deere 8R 250</text>
          <rect x="16" y="42" width="216" height="17" rx="3" fill="#EFEAE0"/>
          <text x="23" y="54" font-size="8" fill="#6F6A5D">Complaint: hydraulic fluid loss, slow hitch…</text>
          <g transform="translate(170,9) rotate(-4)"><rect width="62" height="18" rx="3" fill="none" stroke="#B9701A" stroke-width="1.5"/><text x="31" y="13" font-family="'Oswald','Arial Narrow',sans-serif" font-size="8.5" font-weight="700" text-anchor="middle" fill="#B9701A">IN PROGRESS</text></g>
        </g>

        <!-- labor clock card -->
        <g transform="translate(14,136)">
          <rect width="248" height="96" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
          <text x="124" y="20" font-family="'Oswald','Arial Narrow',sans-serif" font-size="8" letter-spacing="1" text-anchor="middle" fill="#6F6A5D">ON THE CLOCK</text>
          <text x="124" y="33" font-size="9.5" font-weight="600" text-anchor="middle" fill="#211D17">SCV coupler seal &amp; return-line R&amp;R</text>
          <text x="124" y="60" font-family="'Oswald','Arial Narrow',sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#B9701A">3:00:12</text>
          <rect x="20" y="68" width="208" height="20" rx="5" fill="#E2932F"/>
          <text x="124" y="82" font-family="'Oswald','Arial Narrow',sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#211D17">◼ CLOCK OUT</text>
        </g>

        <!-- ops -->
        <text x="14" y="250" font-family="'Oswald','Arial Narrow',sans-serif" font-size="9" letter-spacing="1" fill="#6F6A5D">OPERATIONS</text>
        <text x="262" y="250" font-family="'IBM Plex Mono',monospace" font-size="8.5" text-anchor="end" fill="#A29C8B">1/4 DONE</text>

        <g transform="translate(14,258)">
          <rect width="248" height="28" rx="5" fill="#FFFFFF" stroke="#DDD6C4"/>
          <circle cx="20" cy="14" r="9" fill="#3F6B4F"/>
          <path d="M16 14 l3 3 l6 -6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
          <text x="38" y="18" font-size="9.5" fill="#6F6A5D">Hydraulic diagnosis &amp; pressure test</text>
        </g>
        <g transform="translate(14,290)">
          <rect width="248" height="28" rx="5" fill="#FFFFFF" stroke="#DDD6C4"/>
          <rect width="4" height="28" fill="#E2932F"/>
          <circle cx="20" cy="14" r="9" fill="none" stroke="#E2932F" stroke-width="2"/>
          <text x="38" y="18" font-size="9.5" font-weight="600" fill="#211D17">SCV coupler seal R&amp;R · current</text>
        </g>
        <g transform="translate(14,322)">
          <rect width="248" height="28" rx="5" fill="#FFFFFF" stroke="#DDD6C4"/>
          <rect width="4" height="28" fill="#B4502E"/>
          <rect x="12" y="8" width="14" height="12" rx="2" fill="none" stroke="#B4502E" stroke-width="1.6"/>
          <path d="M15 8 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#B4502E" stroke-width="1.6"/>
          <text x="38" y="15" font-size="9" font-weight="600" fill="#211D17">PTO shield R&amp;R</text>
          <text x="38" y="26" font-size="7.5" fill="#8C3B20">Waiting on JD-77410 · ETA Thu</text>
        </g>

        <!-- bottom complete bar -->
        <rect y="360" width="276" height="34" fill="#FFFFFF"/>
        <line x1="0" y1="360" x2="276" y2="360" stroke="#DDD6C4"/>
        <rect x="14" y="366" width="248" height="22" rx="5" fill="#E2932F" opacity="0.45"/>
        <text x="138" y="381" font-family="'Oswald','Arial Narrow',sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#7A4E12">COMPLETE JOB → QC</text>
      </g>
    </g>
    <text x="168" y="452" font-family="'Oswald','Arial Narrow',sans-serif" font-size="12" letter-spacing="2" text-anchor="middle" fill="#6F6A5D">TECHNICIAN · TABLET</text>
  </g>

  <!-- footer reason -->
  <line x1="56" y1="636" x2="1264" y2="636" stroke="#DDD6C4"/>
  <text x="56" y="666" font-size="13.5" fill="#4A453A"><tspan font-weight="600" fill="#211D17">Why a separate view — </tspan>the manager reads a board; the technician acts on one job with greasy gloves. Same live data, a layout built for the shop floor:</text>
  <text x="56" y="686" font-size="13.5" fill="#4A453A">big tap targets, a live labor clock, one operation at a time — no dashboard to get lost in.</text>
</svg>
