<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760" font-family="'IBM Plex Sans','Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1240" height="760" fill="#F6F3EC"/>

  <!-- header -->
  <text x="56" y="56" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" letter-spacing="3" fill="#B9701A">FIELDBOOK · INSIDE THE BAY VIEW</text>
  <text x="56" y="94" font-family="'Oswald','Arial Narrow',sans-serif" font-size="32" font-weight="600" fill="#211D17">The screen a technician actually works from</text>

  <!-- ============ TABLET ============ -->
  <g transform="translate(70,120)">
    <rect x="8" y="10" width="400" height="600" rx="34" fill="#211D17" opacity="0.08"/>
    <rect width="400" height="600" rx="34" fill="#141A17" stroke="#2C342E" stroke-width="2"/>
    <circle cx="200" cy="22" r="3.5" fill="#3A423C"/>
  </g>

  <!-- device column (absolute origin 100,154) -->
  <g transform="translate(100,154)">
    <rect width="340" height="540" rx="8" fill="#F1ECE1"/>
    <clipPath id="col2"><rect width="340" height="540" rx="8"/></clipPath>
    <g clip-path="url(#col2)">
      <!-- appbar -->
      <rect width="340" height="56" fill="#1F2623"/>
      <text x="18" y="35" font-size="21" fill="#F2EFE6">‹</text>
      <rect x="38" y="13" width="30" height="30" rx="6" fill="#E2932F"/>
      <text x="53" y="34" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">RA</text>
      <text x="80" y="28" font-family="'Oswald','Arial Narrow',sans-serif" font-size="14" font-weight="600" fill="#F2EFE6">R. Alvarez</text>
      <text x="80" y="43" font-size="9.5" letter-spacing="0.5" fill="#A29C8B">BAY 2 · SERVICE</text>
      <text x="322" y="24" font-size="8.5" letter-spacing="0.5" text-anchor="end" fill="#A29C8B">ON SHIFT</text>
      <text x="322" y="41" font-family="'IBM Plex Mono',monospace" font-size="14" text-anchor="end" fill="#F2EFE6">3:12</text>

      <!-- hero -->
      <g transform="translate(16,66)">
        <rect width="308" height="80" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
        <rect width="6" height="80" rx="3" fill="#E2932F"/>
        <text x="18" y="22" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6F6A5D">WO-88213</text>
        <text x="18" y="42" font-family="'Oswald','Arial Narrow',sans-serif" font-size="17" font-weight="600" fill="#211D17">John Deere 8R 250</text>
        <rect x="18" y="52" width="272" height="20" rx="4" fill="#EFEAE0"/>
        <text x="27" y="66" font-size="9.5" fill="#6F6A5D">Complaint: steady hydraulic fluid loss, slow hitch…</text>
        <g transform="translate(214,12) rotate(-4)"><rect width="76" height="22" rx="3" fill="none" stroke="#B9701A" stroke-width="1.8"/><text x="38" y="16" font-family="'Oswald','Arial Narrow',sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#B9701A">IN PROGRESS</text></g>
      </g>

      <!-- labor clock -->
      <g transform="translate(16,156)">
        <rect width="308" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
        <text x="154" y="24" font-family="'Oswald','Arial Narrow',sans-serif" font-size="9" letter-spacing="1" text-anchor="middle" fill="#6F6A5D">CURRENT OPERATION</text>
        <text x="154" y="40" font-size="11" font-weight="600" text-anchor="middle" fill="#211D17">SCV coupler seal &amp; return-line R&amp;R</text>
        <text x="154" y="76" font-family="'Oswald','Arial Narrow',sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#211D17">3:00:12</text>
        <rect x="20" y="90" width="268" height="26" rx="6" fill="#3F6B4F"/>
        <text x="154" y="107" font-family="'Oswald','Arial Narrow',sans-serif" font-size="12" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#FFFFFF">▶ CLOCK IN</text>
      </g>

      <!-- quick actions 2x2 -->
      <g transform="translate(16,296)" font-size="10" font-weight="600" fill="#211D17">
        <g><rect width="150" height="32" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/><rect x="10" y="9" width="14" height="14" rx="3" fill="#4A6C7A"/><text x="32" y="21">Request part</text></g>
        <g transform="translate(158,0)"><rect width="150" height="32" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/><rect x="10" y="9" width="14" height="14" rx="3" fill="#4A6C7A"/><text x="32" y="21">Add photo</text></g>
        <g transform="translate(0,38)"><rect width="150" height="32" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/><rect x="10" y="9" width="14" height="14" rx="3" fill="#4A6C7A"/><text x="32" y="21">Add note</text></g>
        <g transform="translate(158,38)"><rect width="150" height="32" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/><rect x="10" y="9" width="14" height="14" rx="3" fill="#4A6C7A"/><text x="32" y="21">Flag issue</text></g>
      </g>

      <!-- operations -->
      <text x="16" y="400" font-family="'Oswald','Arial Narrow',sans-serif" font-size="11" letter-spacing="1" fill="#6F6A5D">OPERATIONS</text>
      <text x="324" y="400" font-family="'IBM Plex Mono',monospace" font-size="9.5" text-anchor="end" fill="#A29C8B">1/4 DONE</text>
      <g transform="translate(16,408)">
        <rect width="308" height="34" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
        <circle cx="23" cy="17" r="11" fill="#3F6B4F"/>
        <path d="M18 17 l4 4 l7 -8" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
        <text x="44" y="21" font-size="11" fill="#6F6A5D">Hydraulic diagnosis &amp; pressure test</text>
        <text x="298" y="21" font-family="'IBM Plex Mono',monospace" font-size="9.5" text-anchor="end" fill="#8A8474">1:30</text>
      </g>
      <g transform="translate(16,448)">
        <rect width="308" height="34" rx="6" fill="#FFFFFF" stroke="#DDD6C4"/>
        <rect width="5" height="34" fill="#E2932F"/>
        <circle cx="23" cy="17" r="11" fill="none" stroke="#E2932F" stroke-width="2.2"/>
        <text x="44" y="21" font-size="11" font-weight="600" fill="#211D17">SCV coupler seal R&amp;R · current</text>
      </g>

      <!-- bottom complete bar -->
      <rect y="500" width="340" height="40" fill="#FFFFFF"/>
      <line x1="0" y1="500" x2="340" y2="500" stroke="#DDD6C4"/>
      <rect x="16" y="507" width="308" height="26" rx="6" fill="#E2932F" opacity="0.5"/>
      <text x="170" y="524" font-family="'Oswald','Arial Narrow',sans-serif" font-size="11" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#7A4E12">COMPLETE JOB → QC</text>
    </g>
  </g>

  <!-- ============ CALLOUTS ============ -->
  <!-- leader lines -->
  <g fill="none" stroke="#C4BBA8" stroke-width="1.5">
    <polyline points="440,182 486,182 486,180 520,180"/>
    <polyline points="440,300 486,300 486,342 520,342"/>
    <polyline points="440,470 486,470 486,486 520,486"/>
    <polyline points="440,570 486,570 486,592 520,592"/>
    <polyline points="440,664 486,664 486,676 520,676"/>
  </g>
  <g>
    <circle cx="446" cy="182" r="3.5" fill="#B9701A"/>
    <circle cx="446" cy="300" r="3.5" fill="#B9701A"/>
    <circle cx="446" cy="470" r="3.5" fill="#B9701A"/>
    <circle cx="446" cy="570" r="3.5" fill="#B9701A"/>
    <circle cx="446" cy="664" r="3.5" fill="#B9701A"/>
  </g>

  <!-- label 1 -->
  <circle cx="532" cy="180" r="12" fill="#E2932F"/>
  <text x="532" y="185" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">1</text>
  <text x="556" y="177" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" font-weight="600" letter-spacing="0.3" fill="#211D17">ONE TECH, ONE BAY</text>
  <text x="556" y="197" font-size="13" fill="#5A554A">The tech's own job queue lives up here, so the bay device never</text>
  <text x="556" y="215" font-size="13" fill="#5A554A">leans on the manager's dashboard.</text>

  <!-- label 2 -->
  <circle cx="532" cy="342" r="12" fill="#E2932F"/>
  <text x="532" y="347" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">2</text>
  <text x="556" y="339" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" font-weight="600" letter-spacing="0.3" fill="#211D17">LIVE LABOR CLOCK</text>
  <text x="556" y="359" font-size="13" fill="#5A554A">The signature action. Clock in / out per operation and the time</text>
  <text x="556" y="377" font-size="13" fill="#5A554A">books straight onto the work order.</text>

  <!-- label 3 -->
  <circle cx="532" cy="486" r="12" fill="#E2932F"/>
  <text x="532" y="491" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">3</text>
  <text x="556" y="483" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" font-weight="600" letter-spacing="0.3" fill="#211D17">QUICK ACTIONS, ONE TAP</text>
  <text x="556" y="503" font-size="13" fill="#5A554A">Request a part, add a photo or note, or flag the manager —</text>
  <text x="556" y="521" font-size="13" fill="#5A554A">54px targets sized for gloved hands.</text>

  <!-- label 4 -->
  <circle cx="532" cy="592" r="12" fill="#E2932F"/>
  <text x="532" y="597" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">4</text>
  <text x="556" y="589" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" font-weight="600" letter-spacing="0.3" fill="#211D17">OPERATION CHECKLIST</text>
  <text x="556" y="609" font-size="13" fill="#5A554A">Each op reads done ✓, current, pending, or blocked when a</text>
  <text x="556" y="627" font-size="13" fill="#5A554A">part is on backorder.</text>

  <!-- label 5 -->
  <circle cx="532" cy="676" r="12" fill="#E2932F"/>
  <text x="532" y="681" font-family="'Oswald','Arial Narrow',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#211D17">5</text>
  <text x="556" y="673" font-family="'Oswald','Arial Narrow',sans-serif" font-size="15" font-weight="600" letter-spacing="0.3" fill="#211D17">COMPLETE JOB → QC</text>
  <text x="556" y="693" font-size="13" fill="#5A554A">Hands the finished job back into the service flow the manager</text>
  <text x="556" y="711" font-size="13" fill="#5A554A">sees on the board.</text>
</svg>
